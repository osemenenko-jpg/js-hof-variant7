<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State Manager</title>

  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>

  <h1>TODO App (State Manager)</h1>

  <form id="todoForm">
    <input id="todoInput" type="text" placeholder="Введи задачу..." />
    <button type="submit">Додати</button>
  </form>

  <div>
    <button data-filter="all">Усі</button>
    <button data-filter="active">Активні</button>
    <button data-filter="completed">Виконані</button>
  </div>

  <ul id="todoList"></ul>

  <p id="totalCount"></p>
  <p id="completedCount"></p>

  <script src="./src/app.js"></script>
</body>
</html>
